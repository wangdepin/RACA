[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "hf_utility"
version = "0.1.0"
description = "HuggingFace Hub dataset management with manifest tracking"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "huggingface_hub",
    "datasets",
]

[project.optional-dependencies]
test = ["pytest", "pytest-mock"]

[tool.pytest.ini_options]
testpaths = ["hf_utility/tests"]
